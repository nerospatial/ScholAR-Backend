version: "3.9"

services:
  backend:
    build: .
    image: harinypatel/scholar-backend:latest
    container_name: scholar_backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 9.9.9.9

  db:
    image: postgres:15
    container_name: scholar_db
    restart: always
    environment:
      POSTGRES_USER: scholar
      POSTGRES_PASSWORD: scholar123
      POSTGRES_DB: scholar_backend
    ports:
      - "6543:6543"
    command: -p 6543
    volumes:
      - scholar_data:/var/lib/postgresql/data

volumes:
  scholar_data:
